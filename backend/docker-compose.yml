version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hiconecta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hiconectarh
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: senha_postgres_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hiconecta_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiconecta_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:senha_postgres_dev@postgres:5432/hiconectarh
      REDIS_URL:    redis://redis:6379
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed --preview-feature || true &&
             node src/server.js"

  # ── Adminer (DB Admin) ────────────────────
  adminer:
    image: adminer:latest
    container_name: hiconecta_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles: ["dev"]

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: hiconecta_network
