{% extends "base.html" %}{% load hi_tags %}{% block title %}Cálculo em Massa{% endblock %}{% block content %}<div class="page-inner"><div class="hi-card-hd" style="margin-bottom:14px"><h2>⚡ Cálculo em Massa</h2></div><div class="hi-card"><div class="hi-form-grid"><div class="hi-form-group"><label class="hi-label">Tipo</label><select id="cm-tipo" class="hi-select"><option value="ferias">Férias Coletivas</option><option value="decimo">13º Salário Coletivo</option><option value="reajuste">Reajuste Salarial</option></select></div><div class="hi-form-group" id="cm-pct-wrap" style="display:none"><label class="hi-label">Percentual (%)</label><input type="number" id="cm-pct" class="hi-input" value="5" min="0" max="100"></div></div><button class="btn-primary" onclick="executarMassa()">⚡ Calcular Todos</button></div><div class="hi-card" style="margin-top:10px;padding:0"><div class="table-wrap"><table class="hi-table" id="cm-table"><thead><tr><th><input type="checkbox" onchange="selAll(this)"></th><th>Colaborador</th><th>Cargo</th><th>Salário Base</th><th>Resultado</th></tr></thead><tbody>{% for c in colabs %}<tr><td><input type="checkbox" class="cm-sel" data-id="{{ c.id }}"></td><td><strong>{{ c.nome }}</strong></td><td>{{ c.cargo|default:"—" }}</td><td>{{ c.salario_base|moeda }}</td><td id="cm-res-{{ c.id }}" style="color:var(--text-muted)">—</td></tr>{% endfor %}</tbody></table></div></div><div id="cm-total" class="hi-card" style="display:none;margin-top:10px;text-align:center"></div></div><script>document.getElementById("cm-tipo").addEventListener("change",function(){document.getElementById("cm-pct-wrap").style.display=this.value==="reajuste"?"block":"none"});function selAll(cb){document.querySelectorAll(".cm-sel").forEach(el=>el.checked=cb.checked)}async function executarMassa(){const tipo=document.getElementById("cm-tipo").value;const ids=[...document.querySelectorAll(".cm-sel:checked")].map(el=>el.dataset.id);if(!ids.length){Toast.warning("Selecione colaboradores.");return}const pct=parseFloat(document.getElementById("cm-pct").value||5);const resp=await Api.post("{% url 'dp:calculo_massa_executar' %}",{tipo,colaborador_ids:ids,percentual:pct});if(!resp.sucesso){Toast.error(resp.mensagem);return}resp.resultados.forEach(r=>{const el=document.getElementById("cm-res-"+r.resultado?.colaborador_id||"");const liq=r.resultado?.valor_liquido||r.resultado?.total_liquido||r.resultado?.parcela_2||0;if(el)el.innerHTML=`<span style="color:var(--success);font-weight:700">R$ ${parseFloat(liq).toFixed(2)}</span>`});const tot=document.getElementById("cm-total");tot.style.display="block";tot.innerHTML=`<strong style="font-size:16px">Total Líquido: R$ ${resp.total_liquido.toFixed(2)}</strong><br><small>${resp.total} colaboradores calculados</small>`;Toast.success("Cálculo concluído!")}</script>{% endblock %}
