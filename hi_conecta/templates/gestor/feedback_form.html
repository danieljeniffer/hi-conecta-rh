{% extends "base.html" %}
{% block title %}Dar Feedback{% endblock %}

{% block content %}
<div class="container-fluid py-3 px-4" style="max-width:700px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="{% url 'gestor:hub' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    <h1 class="h4 fw-bold text-white mb-0">Dar Feedback</h1>
  </div>

  <div style="background:#0f172a;border:1px solid rgba(99,102,241,.15);border-radius:12px;padding:1.5rem">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label text-muted small">Colaborador *</label>
        <select name="colaborador_id" class="form-select bg-dark border-secondary text-white" required>
          <option value="">— Selecionar —</option>
          {% for c in colaboradores %}<option value="{{ c.id }}">{{ c.nome }}</option>{% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label text-muted small">Tipo de Feedback *</label>
        <select name="tipo" class="form-select bg-dark border-secondary text-white">
          {% for v, l in tipos %}<option value="{{ v }}">{{ l }}</option>{% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label text-muted small">Assunto *</label>
        <input type="text" name="assunto" class="form-control bg-dark border-secondary text-white" required placeholder="Tema principal do feedback">
      </div>
      <div class="mb-3">
        <label class="form-label text-muted small">Mensagem *</label>
        <textarea name="mensagem" class="form-control bg-dark border-secondary text-white" rows="6" required placeholder="Descreva o feedback de forma clara e construtiva..."></textarea>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="privado" value="1" id="privado">
        <label class="form-check-label text-muted" for="privado">Privado (apenas gestor e RH visualizam)</label>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>Enviar Feedback</button>
        <a href="{% url 'gestor:hub' %}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
